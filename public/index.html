<!doctype html>
<html lang="en">
    <!-- Head -->
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta charset="UTF-8">
        <title>Akira25's main page</title>
        <link rel="stylesheet" href="data/style.css">

    <!-- Style -->
        <style>
            html    { height: 100% }
            body {
                
                height                  : 100%;
                
            /* Disable blur */
                filter                  : none !important;
                backdrop-filter         : none !important;
                
            /* Backbround */
                background              : url(data/images/backgrounds/background.png);
                background-size         : cover;
                
            /* Flex */
                display                 : flex;
                flex-direction          : column;
                
            /* Centerify elements */
                justify-content         : center;
                align-items             : center;
                align-content           : center;
            }

            .main {
                width                   : 640px;
                height                  : 480px;
                /* background-color        : #ff0000; */
                display                 : flex;
            }

            .left-closet {
                width                   : 200px;
                height                  : 100%;
                background              : url(data/images/closet/left-side.png);
                display                 : inline-block;
                image-rendering         : pixelated;
            }
            
            .middle-closet {
                width                   : 344px;
                height                  : 100%;
                background              : url(data/images/closet/middle.png);
                display                 : inline-block;
                image-rendering         : pixelated;
            }
            
            .right-closet {
                width                   : 96px;
                height                  : 100%;
                background              : url(data/images/closet/right-side.png);
                display                 : inline-block;
                image-rendering         : pixelated;
            }
        </style>
    </head>

    <!-- Body -->
    <body>
        <!-- Main -->
        <div class = "main">
            <!-- Left Closet -->
            <div class = "left-closet">
            </div> 
            <!-- Middle Closet -->
            <div class = "middle-closet">
            </div>
            <!-- Right Closet -->
            <div class = "right-closet">
            </div>
        </div>
    </body>
</html>
